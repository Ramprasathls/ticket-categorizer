services:
  - type: web
    name: ticket-categorizer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # you'll paste this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
